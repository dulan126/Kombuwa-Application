root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./cmd/server"
  bin = "./tmp/main"
  delay = 800
  exclude_dir = ["tmp", "vendor"]
  include_ext = ["go"]
  kill_delay = "200ms"
  send_interrupt = true
  stop_on_error = true
  log = "build-errors.log"

[log]
  time = true

[screen]
  clear_on_rebuild = false
